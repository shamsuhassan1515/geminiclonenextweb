# Lima 虚拟机配置文件 - bt-server
# 用于宝塔面板开发环境

images:
  - location: "/Users/aydinkaya/开发/OrbStack/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: 14GiB
disk: 40GiB

mounts:
  - location: "/Users/aydinkaya/开发"
    writable: true

ssh:
  localPort: 2222
  loadDotSSHPubKeys: true

portForwards:
  - guestPort: 12481
    hostPort: 12481
  - guestPort: 38968
    hostPort: 38968
  - guestPort: 80
    hostPort: 8080
  - guestPort: 443
    hostPort: 8443
  - guestPort: 3306
    hostPort: 3306
  - guestPort: 8888
    hostPort: 8888
  - guestPort: 3000
    hostPort: 3000
  - guestPort: 3001
    hostPort: 3001
  - guestPort: 3002
    hostPort: 3002
  - guestPort: 1002
    hostPort: 1002

mountType: virtiofs

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y curl wget vim net-tools procps
      echo "基础工具安装完成"
