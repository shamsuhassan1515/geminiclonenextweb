flyenv:
  name: 'Gemini Clone Backend'
  description: 'Gemini Clone Backend Service - API Server'
  version: '2.15.6'
  type: nodejs
  port: 3002
  workingDirectory: /Users/aydinkaya/开发/chatgpt-web-midjourney-proxy/service
  startCommand: npm run dev
  stopCommand: pkill -f esno
  restartCommand: 'pkill -f esno && npm run dev'
  buildCommand: npm run build
  env:
    NODE_ENV: development
    PORT: '3002'
  autoStart: true
  restartOnCrash: true
  log:
    file: /Users/aydinkaya/开发/chatgpt-web-midjourney-proxy/service/logs/flyenv.log
    maxSize: 10m
    maxFiles: 5
  features:
    hotReload: true
    logRotation: true
  monitoring:
    healthCheck:
      enabled: true
      path: /api/config
      interval: 30
  author: shamsuhassan1515
  repository: 'https://github.com/shamsuhassan1515/geminiclonenextweb'
  homepage: 'http://localhost:3002'
